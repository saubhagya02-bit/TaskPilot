<div class="task-container">
  <h2>My To-Do</h2>

  <!-- Add  -->
  <div class="add-task">
    <input
      type="text"
      [(ngModel)]="newTask"
      placeholder="Enter new task"
      (keyup.enter)="addTask()"
    />

    <input type="date" [(ngModel)]="taskDate" />

    <button (click)="addTask()">Add</button>
  </div>

  <ul class="task-list">
    <li *ngFor="let task of tasks; let i = index" [class.completed]="task.completed">
      <div *ngIf="editingIndex !== i">
        <input type="checkbox" [checked]="task.completed" (change)="toggleTask(i)" />
        <span>{{ task.title }}</span>
        <small>{{ task.date | date:'yyyy-MM-dd' }}</small>
        <button (click)="startEdit(i)">Edit</button>
        <button (click)="deleteTask(task.id)">Delete</button>
      </div>

      <!-- Edit -->
      <div *ngIf="editingIndex === i">
        <input type="text" [(ngModel)]="editedTask" (keyup.enter)="saveEdit(i)" />
        <button (click)="saveEdit(i)">Save</button>
        <button (click)="cancelEdit()">Cancel</button>
      </div>
    </li>
  </ul>
</div>
