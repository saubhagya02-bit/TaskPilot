<div class="page">
  <header class="page-header">
    <div>
      <h1 class="page-title">📋 To-Do</h1>
      <p class="page-sub">{{ tasks.length }} task{{ tasks.length !== 1 ? 's' : '' }} total</p>
    </div>
  </header>

  <!-- Error Banner -->
  <div class="error-banner" *ngIf="error">
    <span>⚠ {{ error }}</span>
    <button (click)="error = ''">✕</button>
  </div>

  <!-- Add Task -->
  <div class="add-card">
    <input
      class="add-input"
      type="text"
      [(ngModel)]="newTask"
      placeholder="Add a new task..."
      (keyup.enter)="addTask()"
    />
    <input
      class="date-input"
      type="date"
      [(ngModel)]="taskDate"
      title="Schedule for date"
    />
    <button class="add-btn" (click)="addTask()">
      <span>+</span> Add
    </button>
  </div>

  <!-- Loading -->
  <div class="state-box" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading tasks...</p>
  </div>

  <!-- Empty -->
  <div class="empty-state" *ngIf="!loading && tasks.length === 0">
    <div class="empty-icon">✨</div>
    <p class="empty-title">All clear!</p>
    <p class="empty-sub">Add your first task above to get started.</p>
  </div>

  <!-- Task List -->
  <ul class="task-list" *ngIf="!loading">
    <li *ngFor="let task of tasks; let i = index" class="task-item" [class.done]="task.completed">

      <!-- View mode -->
      <div *ngIf="editingIndex !== i" class="task-row">
        <div class="custom-check" [class.checked]="task.completed" (click)="toggleTask(task)">
          <span *ngIf="task.completed" class="check-mark">✓</span>
        </div>
        <div class="task-body">
          <span class="task-title">{{ task.title }}</span>
          <span class="task-date" *ngIf="task.date">{{ task.date | date: 'MMM d, yyyy' }}</span>
        </div>
        <div class="task-actions">
          <button class="icon-btn" (click)="startEdit(i)" title="Edit">✏️</button>
          <button class="icon-btn" (click)="deleteTask(task.id)" title="Delete">🗑</button>
        </div>
      </div>

      <!-- Edit mode -->
      <div *ngIf="editingIndex === i" class="edit-row">
        <input
          class="edit-input"
          type="text"
          [(ngModel)]="editedTask"
          (keyup.enter)="saveEdit(task)"
          (keyup.escape)="cancelEdit()"
        />
        <input class="date-input-sm" type="date" [(ngModel)]="editedDate" />
        <div class="edit-actions">
          <button class="save-btn" (click)="saveEdit(task)">Save</button>
          <button class="cancel-btn" (click)="cancelEdit()">Cancel</button>
        </div>
      </div>

    </li>
  </ul>
</div>
